name: release ready

on:
  pull_request_target:
    types: [ready_for_review]

jobs:
  local-gui-release-ready:
    if: "${{ contains(github.event.pull_request.labels.*.name, 'release-line: gui') }}"
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-ready.yml@main
    with:
      product-name: Local GUI
      slack-channel: "#proj-agent-canvas"

  cloud-release-ready:
    if: "${{ contains(github.event.pull_request.labels.*.name, 'release-line: cloud') }}"
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-ready.yml@main
    with:
      product-name: OpenHands Cloud
      slack-channel: "#openhands-cloud"
